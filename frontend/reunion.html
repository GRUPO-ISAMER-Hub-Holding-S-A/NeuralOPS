<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Agendar reunión | NeuralOps</title>
    <link rel="icon" href="./src/assets/cerebro.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            background: #050505;
            color: white;
            font-family: Inter;
        }

        .reunion-container {
            max-width: 600px;
            margin: 80px auto;
            padding: 40px;
            background: #111;
            border-radius: 20px;
            text-align: center;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
        }

        button {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header>
        <!-- NAV -->
        <nav>
            <a href="index.html" class="nav-logo">
                <span class="nav-logo-dot"></span>NeuralOps
            </a>


            <button id="menuToggle" class="menu-toggle">

                ☰

            </button>

            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="soluciones.html">Soluciones</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
            </ul>

            <div id="adminLink"></div>

            <div class="nav-right"></div>

        </nav>
    </header>




    <div id="cur"></div>
    <div id="cur-ring"></div>


    <div class="reunion-container">

        <h1>Agendar reunión</h1>

        <p>
            Elegí un día y horario disponible.
        </p>

        <input type="text" id="nombre" placeholder="Nombre">

        <input type="email" id="email" placeholder="Email">

        <input type="date" id="fecha">

        <select id="horarios">
            <option>
                Seleccionar horario
            </option>
        </select>

        <button id="btnReunion" onclick="agendar()">
            Confirmar reunión
        </button>

    </div>

    <script>

        const API = "https://neuralops-u805.onrender.com/api";

        const fechaInput =
            document.getElementById("fecha");

        const hoy = new Date();

        fechaInput.min =
            hoy.toISOString().split("T")[0];

        fechaInput.addEventListener(
            "change",
            cargarHorarios
        );

        async function cargarHorarios() {

            const fecha =
                document.getElementById("fecha").value;

            const res = await fetch(`${API}/horarios?fecha=${fecha}`);

            const horarios = await res.json();

            const select =
                document.getElementById("horarios");

            select.innerHTML = "";

            horarios.forEach(hora => {

                select.innerHTML += `
                    <option value="${hora}">
                        ${hora}
                    </option>
                `;
            });
        }


        async function agendar() {

            const boton =
                document.getElementById("btnReunion");

            if (boton.disabled) return;

            boton.disabled = true;

            boton.innerHTML = "Agendando...";

            try {

                const nombre =
                    document.getElementById("nombre").value;

                const email =
                    document.getElementById("email").value;

                const fecha =
                    document.getElementById("fecha").value;

                const hora =
                    document.getElementById("horarios").value;

                const res = await fetch(

                    `${API}/reunion`,

                    {

                        method: "POST",

                        headers: {

                            "Content-Type": "application/json"

                        },

                        body: JSON.stringify({

                            nombre,

                            email,

                            fecha,

                            hora

                        })

                    }

                );

                const data = await res.json();

                if (!res.ok) {

                    Toastify({

                        text: data.error,

                        duration: 3500,

                        gravity: "top",

                        position: "right",

                        style: {

                            background: "#ff3b30"

                        }

                    }).showToast();

                    return;

                }

                Toastify({

                    text: "📅 Reunión agendada correctamente",

                    duration: 3000,

                    gravity: "top",

                    position: "right",

                    style: {

                        background:
                            "linear-gradient(135deg,#00d9ff,#0066ff)"

                    }

                }).showToast();

                document.getElementById("nombre").value = "";

                document.getElementById("email").value = "";

                document.getElementById("fecha").value = "";

                document.getElementById("horarios").innerHTML =
                    "<option>Seleccionar horario</option>";

            }

            catch (err) {

                console.log(err);

            }

            finally {

                boton.disabled = false;

                boton.innerHTML = "Confirmar reunión";

            }

        }

    </script>


    <script>
        // Cursor
        const cur = document.getElementById('cur');
        const ring = document.getElementById('cur-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cur.style.left = mx + 'px'; cur.style.top = my + 'px'; });
        (function anim() { rx += (mx - rx) * .11; ry += (my - ry) * .11; ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; requestAnimationFrame(anim); })();
        document.querySelectorAll('a,button,.prod-card,.cat-card,.why-card,.payment-card').forEach(el => {
            el.addEventListener('mouseenter', () => { cur.style.width = '18px'; cur.style.height = '18px'; ring.style.width = '50px'; ring.style.height = '50px'; ring.style.borderColor = 'rgba(0,217,255,.4)'; });
            el.addEventListener('mouseleave', () => { cur.style.width = '10px'; cur.style.height = '10px'; ring.style.width = '36px'; ring.style.height = '36px'; ring.style.borderColor = 'rgba(0,217,255,.3)'; });
        });
    </script>


    <script>

        const menuToggle = document.getElementById("menuToggle");

        const navLinks = document.querySelector(".nav-links");

        menuToggle.addEventListener("click", () => {

            navLinks.classList.toggle("active");

        });

        document.querySelectorAll(".nav-links a").forEach(link => {

            link.addEventListener("click", () => {

                navLinks.classList.remove("active");

            });

        });

    </script>


</body>

</html>
