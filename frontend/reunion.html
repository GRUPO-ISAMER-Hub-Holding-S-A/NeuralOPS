<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar reunión | NeuralOps</title>

    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            background: #050505;
            color: white;
            font-family: Inter;
        }

        .reunion-container {
            max-width: 600px;
            margin: 80px auto;
            padding: 40px;
            background: #111;
            border-radius: 20px;
            text-align: center;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: white;
            font-weight: bold;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        select {
            background: white;
            color: black;
        }

        .loading {
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="reunion-container">

        <h1>Agendar reunión</h1>

        <p>
            Elegí un día y horario disponible.
        </p>

        <input
            type="text"
            id="nombre"
            placeholder="Nombre"
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
        >

        <input
            type="date"
            id="fecha"
        >

        <select id="horarios">

            <option value="">
                Primero seleccioná una fecha
            </option>

        </select>

        <button id="btnAgendar" onclick="agendar()">
            Confirmar reunión
        </button>

    </div>

    <script>

        // ✅ API RENDER
        const API =
            "https://neuralops-npet.onrender.com/api";

        const fechaInput =
            document.getElementById("fecha");

        // 🔥 CARGAR HORARIOS AL CAMBIAR FECHA
        fechaInput.addEventListener(
            "change",
            cargarHorarios
        );

        async function cargarHorarios() {

            const fecha =
                document.getElementById("fecha").value;

            const select =
                document.getElementById("horarios");

            // RESET
            select.innerHTML = `
                <option>
                    Cargando horarios...
                </option>
            `;

            try {

                const res = await fetch(
                    `${API}/horarios?fecha=${fecha}`
                );

                // 🔥 SI RENDER TARDA
                if (!res.ok) {

                    select.innerHTML = `
                        <option>
                            Error cargando horarios
                        </option>
                    `;

                    return;
                }

                const horarios = await res.json();

                // 🔥 LIMPIAR
                select.innerHTML = "";

                // 🔥 SI NO HAY HORARIOS
                if (!horarios.length) {

                    select.innerHTML = `
                        <option>
                            No hay horarios disponibles
                        </option>
                    `;

                    return;
                }

                // 🔥 PRIMER OPTION
                select.innerHTML += `
                    <option value="">
                        Seleccionar horario
                    </option>
                `;

                // 🔥 RENDER HORARIOS
                horarios.forEach(hora => {

                    select.innerHTML += `
                        <option value="${hora}">
                            ${hora}
                        </option>
                    `;
                });

            } catch (error) {

                console.log(error);

                select.innerHTML = `
                    <option>
                        Error de conexión
                    </option>
                `;
            }
        }

        // 📅 AGENDAR REUNIÓN
        async function agendar() {

            const nombre =
                document.getElementById("nombre").value;

            const email =
                document.getElementById("email").value;

            const fecha =
                document.getElementById("fecha").value;

            const hora =
                document.getElementById("horarios").value;

            const button =
                document.getElementById("btnAgendar");

            // VALIDACIONES
            if (!nombre || !email || !fecha || !hora) {

                alert("Completá todos los campos");

                return;
            }

            try {

                // 🔥 LOADING BUTTON
                button.innerText = "Agendando...";
                button.disabled = true;

                const res = await fetch(
                    `${API}/reunion`,
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({
                            nombre,
                            email,
                            fecha,
                            hora
                        })
                    }
                );

                const data = await res.json();

                if (!res.ok) {

                    alert(data.error || "Error");

                    button.innerText =
                        "Confirmar reunión";

                    button.disabled = false;

                    return;
                }

                alert(
                    "✅ Reunión agendada correctamente"
                );

                // 🔥 LIMPIAR FORM
                document.getElementById("nombre").value = "";

                document.getElementById("email").value = "";

                document.getElementById("fecha").value = "";

                document.getElementById("horarios").innerHTML = `
                    <option>
                        Primero seleccioná una fecha
                    </option>
                `;

            } catch (error) {

                console.log(error);

                alert("Error de conexión");

            } finally {

                // 🔥 RESTAURAR BOTON
                button.innerText =
                    "Confirmar reunión";

                button.disabled = false;
            }
        }

    </script>

</body>

</html>
