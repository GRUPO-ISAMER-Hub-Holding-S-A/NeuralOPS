<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Automatización, IA y ciberseguridad para empresas, droopshipping, e-commerce y más. Soluciones inteligentes que optimizan procesos y potencian el crecimiento." />
    <meta name="keywords" content="IA, automatización, NeuralOps, ciberseguridad" />
    <meta property="og:title" content="NeuralOps" />
    <meta property="og:description" content="Arquitectura inteligente para operaciones que escalan" />
    <title>Admin | NeuralOps</title>

    <link rel="icon" href="./src/assets/cerebro.png" />
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="styles.css" />


    <style>
        body {
            background: #0a0a0a;
            color: white;
            font-family: Arial;
            padding: 40px;
        }

        input,
        button,
        select {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            cursor: pointer;
        }

        table {
            margin-top: 20px;
            width: 100%;
            border-collapse: collapse;
        }

        td,
        th {
            border: 1px solid #333;
            padding: 10px;
        }

        th {
            background: #111;
        }

        tr:nth-child(even) {
            background: #151515;
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="login">

        <h2>Login Admin</h2>

        <input id="user" placeholder="Usuario">

        <input id="pass" type="password" placeholder="Password">

        <button onclick="login()">
            Entrar
        </button>

        <br><br>

        <button onclick="volverHome()">
            ← Volver al sitio
        </button>

    </div>

    <!-- PANEL -->
    <div id="panel" style="display:none;">

        <h1>Panel Admin</h1>

        <p id="userInfo"></p>

        <button onclick="volverHome()">
            ← Volver al sitio
        </button>

        <button onclick="logout()">
            Cerrar sesión
        </button>

        <br><br>

        <input id="buscar" placeholder="Buscar..." onkeyup="filtrar()">

        <table>

            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Consulta</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tabla"></tbody>

        </table>

    </div>

    <script>

        const API = "https://neuralops-npet.onrender.com/api";

        let leadsGlobal = [];

        // AUTO LOGIN
        window.onload = async () => {

            const token = localStorage.getItem("token");

            if (!token) return;

            try {

                const res = await fetch(
                    "https://neuralops-npet.onrender.com/api/leads",
                    {
                        headers: {
                            "Authorization": `Bearer ${token}`
                        }
                    }
                );

                if (!res.ok) {

                    localStorage.removeItem("token");

                    return;
                }

                mostrarPanel();

                mostrarUsuario(token);

                cargarLeads();

            } catch (error) {

                console.log(error);

                localStorage.removeItem("token");
            }
        };

        // LOGIN
        async function login() {

            const user = document.getElementById("user").value;
            const pass = document.getElementById("pass").value;

            const res = await fetch("https://neuralops-npet.onrender.com/api/login", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    user,
                    pass
                })

            });

            const data = await res.json();

            if (!res.ok) {
                alert(data.error || "Error login");
                return;
            }

            localStorage.setItem("token", data.token);

            mostrarPanel();

            mostrarUsuario(data.token);

            cargarLeads();
        }

        // MOSTRAR PANEL
        function mostrarPanel() {

            document.getElementById("login").style.display = "none";

            document.getElementById("panel").style.display = "block";
        }

        // MOSTRAR USER
        function mostrarUsuario(token) {

            const payload = JSON.parse(
                atob(token.split(".")[1])
            );

            document.getElementById("userInfo").innerText =
                "Logueado como: " + payload.user;
        }

        // CARGAR LEADS
        async function cargarLeads() {

            const token = localStorage.getItem("token");

            const res = await fetch(
                "https://neuralops-npet.onrender.com/api/leads",
                {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                }
            );

            if (res.status === 401 || res.status === 403) {

                alert("Sesión expirada");

                logout();

                return;
            }

            const data = await res.json();

            leadsGlobal = data;

            render(data);
        }

        // RENDER
        function render(data) {

            const tabla = document.getElementById("tabla");

            tabla.innerHTML = "";

            data.forEach(l => {

                tabla.innerHTML += `
                
                <tr>

                    <td>${l.nombre || ""}</td>

                    <td>${l.email || ""}</td>

                    <td>${l.mensaje || "-"}</td>

                    <td>
                        ${new Date(
                    l.fecha || l.createdAt
                ).toLocaleString()}
                    </td>

                    <td>

                        <select id="estado-${l._id}">

                            <option value="nuevo"
                                ${l.estado === "nuevo" ? "selected" : ""}
                            >
                                nuevo
                            </option>

                            <option value="contactado"
                                ${l.estado === "contactado" ? "selected" : ""}
                            >
                                contactado
                            </option>

                            <option value="cliente"
                                ${l.estado === "cliente" ? "selected" : ""}
                            >
                                cliente
                            </option>

                        </select>

                    </td>

                    <td>

                        <button onclick="guardar('${l._id}')">
                            💾
                        </button>

                        <button onclick="eliminar('${l._id}')">
                            ❌
                        </button>

                    </td>

                </tr>
                `;
            });
        }

        // BUSCAR
        function filtrar() {

            const texto =
                document.getElementById("buscar")
                    .value
                    .toLowerCase();

            const filtrados = leadsGlobal.filter(l =>

                (l.nombre || "")
                    .toLowerCase()
                    .includes(texto)

                ||

                (l.email || "")
                    .toLowerCase()
                    .includes(texto)
            );

            render(filtrados);
        }

        // GUARDAR ESTADO
        async function guardar(id) {

            const token = localStorage.getItem("token");

            const estado =
                document.getElementById(`estado-${id}`).value;

            const res = await fetch(
                `https://neuralops-npet.onrender.com/api/lead/${id}`,
                {
                    method: "PUT",

                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },

                    body: JSON.stringify({
                        estado
                    })
                }
            );

            const data = await res.json();

            if (!res.ok) {

                alert(data.error || "Error al guardar");

                return;
            }

            alert("Estado actualizado");
        }

        // ELIMINAR
        async function eliminar(id) {

            if (!confirm("¿Eliminar lead?")) return;

            const token = localStorage.getItem("token");

            const res = await fetch(
                `https://neuralops-npet.onrender.com/api/lead/${id}`,
                {
                    method: "DELETE",

                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                }
            );

            const data = await res.json();

            if (!res.ok) {

                alert(data.error || "Error eliminando");

                return;
            }

            alert("Lead eliminado");

            cargarLeads();
        }

        // LOGOUT
        function logout() {

            localStorage.removeItem("token");

            window.location.href = "index.html";
        }

        // HOME
        function volverHome() {

            window.location.href = "index.html";
        }

    </script>

        <script>
        // Cursor
        const cur = document.getElementById('cur');
        const ring = document.getElementById('cur-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cur.style.left = mx + 'px'; cur.style.top = my + 'px'; });
        (function anim() { rx += (mx - rx) * .11; ry += (my - ry) * .11; ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; requestAnimationFrame(anim); })();
        document.querySelectorAll('a,button,.prod-card,.cat-card,.why-card,.payment-card').forEach(el => {
            el.addEventListener('mouseenter', () => { cur.style.width = '18px'; cur.style.height = '18px'; ring.style.width = '50px'; ring.style.height = '50px'; ring.style.borderColor = 'rgba(0,217,255,.4)'; });
            el.addEventListener('mouseleave', () => { cur.style.width = '10px'; cur.style.height = '10px'; ring.style.width = '36px'; ring.style.height = '36px'; ring.style.borderColor = 'rgba(0,217,255,.3)'; });
        });
        </script>

</body>

</html>
