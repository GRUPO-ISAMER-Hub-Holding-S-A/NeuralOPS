<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Admin</title>
    <style>
        body {
            background: #0a0a0a;
            color: rgb(238, 238, 245);
            font-family: Arial;
            padding: 40px;
        }

        input,
        button {
            padding: 10px;
            margin: 5px;
        }

        table {
            margin-top: 20px;
            width: 100%;
            border-collapse: collapse;
        }

        td,
        th {
            border: 1px solid #333;
            padding: 10px;
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="login">
        <h2>Login Admin</h2>
        <input id="user" placeholder="Usuario">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">Entrar</button>

        <br><br>

        <button onclick="volverHome()">← Volver al sitio</button>
    </div>

    <!-- PANEL -->
    <div id="panel" style="display:none;">
        <h1>Leads</h1>

        <p id="userInfo"></p>

        <button onclick="volverHome()">← Volver al sitio</button>
        <button onclick="logout()">Cerrar sesión</button>

        <h3>Cambiar datos</h3>
        <input id="newUser" placeholder="Nuevo usuario">
        <input id="newPass" type="password" placeholder="Nueva contraseña">
        <button onclick="actualizarAdmin()">Actualizar</button>

        <br><br>

        <input id="buscar" placeholder="Buscar..." onkeyup="filtrar()">

        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>

    <script>
        let leadsGlobal = [];

        const token = localStorage.getItem("token");

        if (!token) {
            document.getElementById("login").style.display = "block";
            document.getElementById("panel").style.display = "none";
        } else {
            document.getElementById("login").style.display = "none";
            document.getElementById("panel").style.display = "block";
            cargarLeads();
        }



        async function login() {
            const user = document.getElementById("user").value;
            const pass = document.getElementById("pass").value;

            const res = await fetch("http://localhost:4000/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user, pass })
            });

            const data = await res.json();

            if (data.token) {
                localStorage.setItem("token", data.token);
                mostrarPanel();
                cargarLeads();
                mostrarUsuario(data.token);
            } else {
                alert(data.error || "Error login");
            }
        }

        function mostrarPanel() {
            document.getElementById("login").style.display = "none";
            document.getElementById("panel").style.display = "block";
        }

        function mostrarUsuario(token) {
            const payload = JSON.parse(atob(token.split(".")[1]));
            document.getElementById("userInfo").innerText =
                "Logueado como: " + payload.user;
        }

        async function cargarLeads() {
            const token = localStorage.getItem("token");

            const res = await fetch("http://localhost:4000/api/leads", {
                headers: { "Authorization": token }
            });

            if (res.status === 401 || res.status === 403) {
                alert("Sesión expirada");
                logout();
                return;
            }

            const data = await res.json();

            leadsGlobal = data;
            render(data);
            actualizarDashboard(data);
        }


        function render(data) {
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";

            data.forEach(l => {
                tabla.innerHTML += `
        <tr>
            <td>${l.nombre}</td>
            <td>${l.email}</td>
            <td>${new Date(l.fecha || l.createdAt).toLocaleString()}</td>

            <td>
                <select id="estado-${l._id}">
                    <option value="nuevo" ${l.estado === "nuevo" ? "selected" : ""}>nuevo</option>
                    <option value="contactado" ${l.estado === "contactado" ? "selected" : ""}>contactado</option>
                    <option value="cliente" ${l.estado === "cliente" ? "selected" : ""}>cliente</option>
                </select>
            </td>

            <td>
                <button onclick="guardar('${l._id}')">💾</button>
                <button onclick="eliminar('${l._id}')">❌</button>
            </td>
        </tr>
        `;
            });
        }

        function filtrar() {
            const texto = document.getElementById("buscar").value.toLowerCase();
            const filtrados = leadsGlobal.filter(l =>
                l.nombre.toLowerCase().includes(texto) ||
                l.email.toLowerCase().includes(texto)
            );
            render(filtrados);
        }

        async function actualizarAdmin() {
            const token = localStorage.getItem("token");

            const nuevoUser = document.getElementById("newUser").value;
            const nuevoPass = document.getElementById("newPass").value;

            const res = await fetch("http://localhost:4000/api/admin/update", {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": token
                },
                body: JSON.stringify({ nuevoUser, nuevoPass })
            });

            const data = await res.json();
            alert(data.message || data.error);
        }

        async function eliminar(id) {
            const token = localStorage.getItem("token");

            console.log("Eliminando:", id); // DEBUG

            if (!confirm("¿Eliminar lead?")) return;

            const res = await fetch(`http://localhost:4000/api/lead/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": token
                }
            });

            const data = await res.json();
            console.log("RESPUESTA DELETE:", data);

            if (!res.ok) {
                alert(data.error || "Error al eliminar");
                return;
            }

            alert("Lead eliminado");
            cargarLeads();
        }

        async function cambiarEstado(id, estado) {
            const token = localStorage.getItem("token");

            const res = await fetch(`http://localhost:4000/api/lead/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": token
                },
                body: JSON.stringify({ estado })
            });

            const data = await res.json();

            if (!res.ok) {
                alert(data.error || "Error al actualizar");
                return;
            }

            // 🔥 feedback visual
            alert("Estado actualizado");

            // 🔄 refrescar tabla
            cargarLeads();
        }


        async function guardar(id) {
            const token = localStorage.getItem("token");
            const estado = document.getElementById(`estado-${id}`).value;

            console.log("Guardando:", id, estado); // DEBUG

            const res = await fetch(`http://localhost:4000/api/lead/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": token
                },
                body: JSON.stringify({ estado })
            });

            const data = await res.json();
            console.log("RESPUESTA:", data);

            if (!res.ok) {
                alert(data.error || "Error al guardar");
                return;
            }

            alert("Estado guardado correctamente");
            cargarLeads();
        }



        function logout() {
            localStorage.removeItem("token");
            window.location.href = "index.html";
        }

        function volverHome() {
            window.location.href = "index.html";
        }
    </script>

</body>

</html>
