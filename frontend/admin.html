<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Admin</title>

    <style>
        body {
            background: #0a0a0a;
            color: white;
            font-family: Arial;
            padding: 40px;
        }

        input,
        button,
        select {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            cursor: pointer;
        }

        table {
            margin-top: 20px;
            width: 100%;
            border-collapse: collapse;
        }

        td,
        th {
            border: 1px solid #333;
            padding: 10px;
        }

        th {
            background: #111;
        }

        tr:nth-child(even) {
            background: #151515;
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="login">

        <h2>Login Admin</h2>

        <input id="user" placeholder="Usuario">

        <input id="pass" type="password" placeholder="Password">

        <button onclick="login()">
            Entrar
        </button>

        <br><br>

        <button onclick="volverHome()">
            ← Volver al sitio
        </button>

    </div>

    <!-- PANEL -->
    <div id="panel" style="display:none;">

        <h1>Panel Admin</h1>

        <p id="userInfo"></p>

        <button onclick="volverHome()">
            ← Volver al sitio
        </button>

        <button onclick="logout()">
            Cerrar sesión
        </button>

        <br><br>

        <input id="buscar" placeholder="Buscar..." onkeyup="filtrar()">

        <table>

            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Consulta</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tabla"></tbody>

        </table>

    </div>

    <script>

        let leadsGlobal = [];

        // AUTO LOGIN
        window.onload = async () => {

            const token = localStorage.getItem("token");

            if (!token) return;

            try {

                const res = await fetch(
                    "http://localhost:4000/api/leads",
                    {
                        headers: {
                            "Authorization": `Bearer ${token}`
                        }
                    }
                );

                if (!res.ok) {

                    localStorage.removeItem("token");

                    return;
                }

                mostrarPanel();

                mostrarUsuario(token);

                cargarLeads();

            } catch (error) {

                console.log(error);

                localStorage.removeItem("token");
            }
        };

        // LOGIN
        async function login() {

            const user = document.getElementById("user").value;
            const pass = document.getElementById("pass").value;

            const res = await fetch("http://localhost:4000/api/login", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    user,
                    pass
                })

            });

            const data = await res.json();

            if (!res.ok) {
                alert(data.error || "Error login");
                return;
            }

            localStorage.setItem("token", data.token);

            mostrarPanel();

            mostrarUsuario(data.token);

            cargarLeads();
        }

        // MOSTRAR PANEL
        function mostrarPanel() {

            document.getElementById("login").style.display = "none";

            document.getElementById("panel").style.display = "block";
        }

        // MOSTRAR USER
        function mostrarUsuario(token) {

            const payload = JSON.parse(
                atob(token.split(".")[1])
            );

            document.getElementById("userInfo").innerText =
                "Logueado como: " + payload.user;
        }

        // CARGAR LEADS
        async function cargarLeads() {

            const token = localStorage.getItem("token");

            const res = await fetch(
                "http://localhost:4000/api/leads",
                {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                }
            );

            if (res.status === 401 || res.status === 403) {

                alert("Sesión expirada");

                logout();

                return;
            }

            const data = await res.json();

            leadsGlobal = data;

            render(data);
        }

        // RENDER
        function render(data) {

            const tabla = document.getElementById("tabla");

            tabla.innerHTML = "";

            data.forEach(l => {

                tabla.innerHTML += `
                
                <tr>

                    <td>${l.nombre || ""}</td>

                    <td>${l.email || ""}</td>

                    <td>${l.mensaje || "-"}</td>

                    <td>
                        ${new Date(
                    l.fecha || l.createdAt
                ).toLocaleString()}
                    </td>

                    <td>

                        <select id="estado-${l._id}">

                            <option value="nuevo"
                                ${l.estado === "nuevo" ? "selected" : ""}
                            >
                                nuevo
                            </option>

                            <option value="contactado"
                                ${l.estado === "contactado" ? "selected" : ""}
                            >
                                contactado
                            </option>

                            <option value="cliente"
                                ${l.estado === "cliente" ? "selected" : ""}
                            >
                                cliente
                            </option>

                        </select>

                    </td>

                    <td>

                        <button onclick="guardar('${l._id}')">
                            💾
                        </button>

                        <button onclick="eliminar('${l._id}')">
                            ❌
                        </button>

                    </td>

                </tr>
                `;
            });
        }

        // BUSCAR
        function filtrar() {

            const texto =
                document.getElementById("buscar")
                    .value
                    .toLowerCase();

            const filtrados = leadsGlobal.filter(l =>

                (l.nombre || "")
                    .toLowerCase()
                    .includes(texto)

                ||

                (l.email || "")
                    .toLowerCase()
                    .includes(texto)
            );

            render(filtrados);
        }

        // GUARDAR ESTADO
        async function guardar(id) {

            const token = localStorage.getItem("token");

            const estado =
                document.getElementById(`estado-${id}`).value;

            const res = await fetch(
                `http://localhost:4000/api/lead/${id}`,
                {
                    method: "PUT",

                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },

                    body: JSON.stringify({
                        estado
                    })
                }
            );

            const data = await res.json();

            if (!res.ok) {

                alert(data.error || "Error al guardar");

                return;
            }

            alert("Estado actualizado");
        }

        // ELIMINAR
        async function eliminar(id) {

            if (!confirm("¿Eliminar lead?")) return;

            const token = localStorage.getItem("token");

            const res = await fetch(
                `http://localhost:4000/api/lead/${id}`,
                {
                    method: "DELETE",

                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                }
            );

            const data = await res.json();

            if (!res.ok) {

                alert(data.error || "Error eliminando");

                return;
            }

            alert("Lead eliminado");

            cargarLeads();
        }

        // LOGOUT
        function logout() {

            localStorage.removeItem("token");

            window.location.href = "index.html";
        }

        // HOME
        function volverHome() {

            window.location.href = "index.html";
        }

    </script>

</body>

</html>
